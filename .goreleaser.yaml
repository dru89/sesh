version: 2

project_name: sesh

before:
  hooks:
    - go mod tidy

builds:
  - id: sesh
    main: ./cmd/sesh
    binary: sesh
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - AGENTS.md
      - shell/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: dru89
    name: sesh
  draft: false
  prerelease: auto

homebrew_casks:
  - repository:
      owner: dru89
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: sesh
    homepage: "https://github.com/dru89/sesh"
    description: "Unified session browser for coding agents"
    binaries: ["sesh"]
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/sesh"]
          end
